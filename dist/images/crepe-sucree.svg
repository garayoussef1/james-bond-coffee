<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1A1008"/>
  <rect x="0" y="0" width="400" height="4" fill="#D4AF37"/>
  <rect x="0" y="296" width="400" height="4" fill="#D4AF37"/>

  <!-- Assiette -->
  <ellipse cx="200" cy="222" rx="130" ry="18" fill="#2A2010" opacity="0.6"/>

  <!-- Crêpe pliée en triangle -->
  <path d="M88 202 Q200 58 312 202 Z" fill="#C8A060"/>
  <path d="M88 202 Q200 58 312 202 Q200 212 88 202 Z" fill="#B8904A"/>

  <!-- Texture bord doré -->
  <path d="M88 202 Q200 58 312 202" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>

  <!-- Nutella coulant (brun foncé) -->
  <path d="M155 155 Q180 140 210 148 Q230 142 250 155 Q235 175 200 178 Q165 175 155 155 Z" fill="#5C3010" opacity="0.9"/>

  <!-- Reflet Nutella -->
  <ellipse cx="195" cy="155" rx="28" ry="12" fill="#7A4418" opacity="0.5"/>

  <!-- Sucre glace (points blancs) -->
  <circle cx="160" cy="170" r="2"   fill="white" opacity="0.7"/>
  <circle cx="175" cy="165" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="240" cy="168" r="2"   fill="white" opacity="0.65"/>
  <circle cx="225" cy="172" r="1.5" fill="white" opacity="0.5"/>

  <!-- Filet de caramel -->
  <path d="M170 180 Q195 168 225 178" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Texte -->
  <text x="200" y="256" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4AF37" text-anchor="middle">Crêpe Sucrée</text>
  <rect x="168" y="262" width="64" height="1.5" fill="#D4AF37" opacity="0.5"/>
</svg>
