<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1A1008"/>
  <rect x="0" y="0" width="400" height="4" fill="#D4AF37"/>
  <rect x="0" y="296" width="400" height="4" fill="#D4AF37"/>

  <!-- Assiette -->
  <ellipse cx="200" cy="220" rx="130" ry="18" fill="#2A2010" opacity="0.6"/>

  <!-- Crêpe pliée en triangle (vue de côté) -->
  <path d="M90 200 Q200 60 310 200 Z" fill="#C8A060"/>
  <path d="M90 200 Q200 60 310 200 Q200 210 90 200 Z" fill="#B8904A"/>

  <!-- Texture de la crêpe (bords dorés) -->
  <path d="M90 200 Q200 60 310 200" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>

  <!-- Garniture visible (thon / fromage fondu) -->
  <ellipse cx="175" cy="155" rx="18" ry="10" fill="#E8D080" opacity="0.85" transform="rotate(-20,175,155)"/>
  <ellipse cx="210" cy="135" rx="14" ry="8"  fill="#F0C050" opacity="0.75" transform="rotate(10,210,135)"/>
  <ellipse cx="195" cy="170" rx="12" ry="7"  fill="#E0B840" opacity="0.8"  transform="rotate(-10,195,170)"/>

  <!-- Persil (points verts) -->
  <circle cx="185" cy="148" r="3" fill="#4A8030" opacity="0.9"/>
  <circle cx="220" cy="162" r="2.5" fill="#4A8030" opacity="0.8"/>
  <circle cx="165" cy="168" r="2" fill="#4A8030" opacity="0.7"/>

  <!-- Sauce blanche -->
  <path d="M160 175 Q180 165 205 172 Q220 168 235 175" fill="none" stroke="rgba(255,255,230,0.6)" stroke-width="3" stroke-linecap="round"/>

  <!-- Texte -->
  <text x="200" y="255" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4AF37" text-anchor="middle">Crêpe Salée</text>
  <rect x="170" y="260" width="60" height="1.5" fill="#D4AF37" opacity="0.5"/>
</svg>
